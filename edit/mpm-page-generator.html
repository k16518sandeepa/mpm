<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MPM — Page Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:#111;--surface-2:#1c1c1c;--surface-3:#252525;
  --red:#e50000;--gold:#c9a84c;--text:#f0ece8;--muted:#888;--dim:#444;
  --radius:8px;--ease:cubic-bezier(0.4,0,0.2,1);--tr:0.25s var(--ease);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* GRAIN */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}

/* HEADER */
header{
  padding:0 28px;height:56px;display:flex;align-items:center;gap:16px;
  background:rgba(8,8,8,.95);border-bottom:1px solid rgba(229,0,0,.2);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text)}
.logo span{color:var(--red)}
header h2{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.header-actions{margin-left:auto;display:flex;gap:10px}

/* LAYOUT */
.workspace{display:grid;grid-template-columns:420px 1fr;height:calc(100vh - 56px);overflow:hidden}

/* FORM PANEL */
.form-panel{
  overflow-y:auto;background:var(--surface);border-right:1px solid rgba(255,255,255,.05);
  padding:24px 20px 40px;display:flex;flex-direction:column;gap:0;
}
.form-panel::-webkit-scrollbar{width:4px}
.form-panel::-webkit-scrollbar-track{background:transparent}
.form-panel::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}

/* SECTIONS */
.section{margin-bottom:8px;border:1px solid rgba(255,255,255,.05);border-radius:10px;overflow:hidden}
.section-header{
  display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;
  background:var(--surface-2);transition:background var(--tr);user-select:none;
}
.section-header:hover{background:var(--surface-3)}
.section-icon{font-size:14px;width:20px;text-align:center}
.section-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.section-chevron{margin-left:auto;color:var(--dim);font-size:12px;transition:transform var(--tr)}
.section.open .section-chevron{transform:rotate(180deg)}
.section-body{display:none;padding:14px;gap:12px;flex-direction:column}
.section.open .section-body{display:flex}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.field input,.field textarea,.field select{
  background:var(--bg);border:1px solid rgba(255,255,255,.08);border-radius:6px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;
  outline:none;transition:border-color var(--tr);width:100%;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(229,0,0,.5)}
.field textarea{resize:vertical;min-height:72px;line-height:1.6}
.field select option{background:var(--surface-2)}
.hint{font-size:11px;color:var(--dim)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* STATS CHIPS */
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;background:var(--bg);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:8px;cursor:text;transition:border-color var(--tr)}
.chips-wrap:focus-within{border-color:rgba(229,0,0,.5)}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px}
.chip.highlight{background:rgba(229,0,0,.1);border-color:rgba(229,0,0,.3);color:var(--red)}
.chip-del{cursor:pointer;color:var(--dim);font-size:12px;transition:color var(--tr)}
.chip-del:hover{color:var(--red)}
.chips-input{border:none;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;min-width:80px;flex:1}

/* DOWNLOADS */
.dl-list{display:flex;flex-direction:column;gap:8px}
.dl-item{
  background:var(--bg);border:1px solid rgba(255,255,255,.07);border-radius:8px;
  padding:10px 12px;display:flex;flex-direction:column;gap:8px;position:relative;
}
.dl-item-header{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--muted)}
.dl-item-del{margin-left:auto;cursor:pointer;color:var(--dim);font-size:16px;transition:color var(--tr);border:none;background:none;color:var(--dim)}
.dl-item-del:hover{color:var(--red)}
.dl-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dl-input{
  background:var(--surface-2);border:1px solid rgba(255,255,255,.06);border-radius:5px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;width:100%;
  transition:border-color var(--tr);
}
.dl-input:focus{border-color:rgba(229,0,0,.4)}
.dl-type-select{background:var(--surface-2);border:1px solid rgba(255,255,255,.06);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;width:100%}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:7px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  border:none;transition:all var(--tr);letter-spacing:.04em;
}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:#cc0000;transform:translateY(-1px);box-shadow:0 6px 20px rgba(229,0,0,.4)}
.btn-secondary{background:var(--surface-3);color:var(--muted);border:1px solid rgba(255,255,255,.07)}
.btn-secondary:hover{color:var(--text);background:var(--surface-2)}
.btn-gold{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.btn-gold:hover{background:rgba(201,168,76,.25);transform:translateY(-1px)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn-icon{font-size:15px}
.add-dl-btn{border:1px dashed rgba(255,255,255,.1);background:transparent;color:var(--dim);border-radius:8px;padding:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;transition:all var(--tr)}
.add-dl-btn:hover{border-color:rgba(229,0,0,.3);color:var(--red)}

/* OUTPUT PANEL */
.output-panel{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.output-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);background:var(--surface);padding:0 20px;gap:2px}
.tab{padding:14px 16px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tr)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:hover:not(.active){color:var(--muted)}
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex;flex-direction:column}

/* PREVIEW */
.preview-frame-wrap{flex:1;position:relative;overflow:hidden}
.preview-frame-wrap iframe{width:100%;height:100%;border:none;background:#000}
.preview-hint{position:absolute;bottom:16px;right:16px;background:rgba(8,8,8,.9);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:11px;color:var(--dim);padding:6px 12px;backdrop-filter:blur(8px)}

/* CODE */
.code-actions{display:flex;gap:10px;padding:14px 18px;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.05);align-items:center}
.filename-display{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-right:auto}
.code-wrap{flex:1;overflow-y:auto;padding:20px}
.code-wrap::-webkit-scrollbar{width:4px}
.code-wrap::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}
pre{font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;color:#c9d1d9;white-space:pre;tab-size:2}

/* TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid rgba(255,255,255,.1);
  color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .3s var(--ease);z-index:9998;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(229,0,0,.4);color:var(--red)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}

/* RESPONSIVE warning */
@media(max-width:900px){
  .workspace{grid-template-columns:1fr}
  .output-panel{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">MPM <span>STUDIO</span></div>
  <h2>Download Page Generator</h2>
  <div class="header-actions">
    <button class="btn btn-secondary btn-sm" onclick="refreshPreview()">⟳ Preview</button>
    <button class="btn btn-gold btn-sm" onclick="copyCode()">⎘ Copy HTML</button>
    <button class="btn btn-primary btn-sm" onclick="downloadHTML()">⬇ Download</button>
  </div>
</header>

<div class="workspace">

  <!-- ═══ FORM PANEL ═══ -->
  <div class="form-panel">

    <!-- META -->
    <div class="section open" id="sec-meta">
      <div class="section-header" onclick="toggleSection('sec-meta')">
        <span class="section-icon">🏷</span>
        <span class="section-title">Meta & Title</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label>Title <span class="hint">— used for page title, og:title, h1, breadcrumb</span></label>
          <input type="text" id="f-title" placeholder="e.g. Debris" oninput="liveUpdate()">
        </div>
        <div class="row">
          <div class="field">
            <label>Category</label>
            <select id="f-category" onchange="liveUpdate()">
              <option value="tv-series">📺 TV Series</option>
              <option value="movies">🎬 Movie</option>
              <option value="anime">⛩ Anime</option>
              <option value="asian-dramas">🌸 Asian Dramas</option>
            </select>
          </div>
          <div class="field">
            <label>Filename <span class="hint">.html</span></label>
            <input type="text" id="f-filename" placeholder="debris" oninput="liveUpdate()">
          </div>
        </div>
        <div class="field">
          <label>Description <span class="hint">— meta desc, og:desc, synopsis</span></label>
          <textarea id="f-desc" placeholder="Two agents from two continents…" oninput="liveUpdate()"></textarea>
        </div>
      </div>
    </div>

    <!-- VISUAL -->
    <div class="section open" id="sec-visual">
      <div class="section-header" onclick="toggleSection('sec-visual')">
        <span class="section-icon">🖼</span>
        <span class="section-title">Visual</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label>OG / Background Image URL <span class="hint">— og:image + blurred backdrop</span></label>
          <input type="text" id="f-ogimg" placeholder="https://lh3.googleusercontent.com/..." oninput="liveUpdate()">
        </div>
        <div class="field">
          <label>Poster Image URL <span class="hint">— img src in poster card</span></label>
          <input type="text" id="f-poster" placeholder="https://m.media-amazon.com/images/..." oninput="liveUpdate()">
        </div>
      </div>
    </div>

    <!-- STATS -->
    <div class="section open" id="sec-stats">
      <div class="section-header" onclick="toggleSection('sec-stats')">
        <span class="section-icon">📊</span>
        <span class="section-title">Stats Chips</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label>Year <span class="hint">— highlighted chip</span></label>
          <input type="text" id="f-year" placeholder="2021" maxlength="4" oninput="liveUpdate()">
        </div>
        <div class="field">
          <label>Other chips <span class="hint">— type and press Enter</span></label>
          <div class="chips-wrap" id="chips-wrap" onclick="document.getElementById('chips-input').focus()">
            <input class="chips-input" id="chips-input" placeholder="e.g. ⭐ IMDb 6.5" onkeydown="handleChipKey(event)">
          </div>
        </div>
      </div>
    </div>

    <!-- TRAILER -->
    <div class="section open" id="sec-trailer">
      <div class="section-header" onclick="toggleSection('sec-trailer')">
        <span class="section-icon">▶</span>
        <span class="section-title">Trailer</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label>YouTube Video ID <span class="hint">— the part after ?v=</span></label>
          <input type="text" id="f-trailer" placeholder="duS-mkHKB4M" oninput="liveUpdate()">
        </div>
      </div>
    </div>

    <!-- DOWNLOADS -->
    <div class="section open" id="sec-dl">
      <div class="section-header" onclick="toggleSection('sec-dl')">
        <span class="section-icon">⬇</span>
        <span class="section-title">Download Buttons</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="dl-list" id="dl-list"></div>
        <button class="add-dl-btn" onclick="addDownload()">＋ Add Download Button</button>
      </div>
    </div>

    <!-- GENERATE -->
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-primary btn-full" onclick="downloadHTML()">
        <span class="btn-icon">⬇</span> Generate & Download HTML
      </button>
      <button class="btn btn-gold btn-full" onclick="copyCode()">
        <span class="btn-icon">⎘</span> Copy to Clipboard
      </button>
    </div>

  </div><!-- /form-panel -->

  <!-- ═══ OUTPUT PANEL ═══ -->
  <div class="output-panel">
    <div class="output-tabs">
      <div class="tab active" onclick="switchTab('preview')">Preview</div>
      <div class="tab" onclick="switchTab('code')">HTML Code</div>
    </div>

    <!-- PREVIEW TAB -->
    <div class="tab-content active" id="tab-preview">
      <div class="preview-frame-wrap">
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        <div class="preview-hint">⟳ Updates on input change</div>
      </div>
    </div>

    <!-- CODE TAB -->
    <div class="tab-content" id="tab-code">
      <div class="code-actions">
        <span class="filename-display" id="code-filename">untitled.html</span>
        <button class="btn btn-secondary btn-sm" onclick="copyCode()">⎘ Copy</button>
        <button class="btn btn-primary btn-sm" onclick="downloadHTML()">⬇ Download</button>
      </div>
      <div class="code-wrap">
        <pre id="code-output"><!-- Generate a page to see the HTML --></pre>
      </div>
    </div>
  </div>

</div><!-- /workspace -->

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let chips = [];
let downloads = [];

// ── SECTION TOGGLE ──
function toggleSection(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

// ── CHIPS ──
function handleChipKey(e) {
  if ((e.key === 'Enter' || e.key === ',') && e.target.value.trim()) {
    e.preventDefault();
    addChip(e.target.value.trim());
    e.target.value = '';
    liveUpdate();
  } else if (e.key === 'Backspace' && !e.target.value && chips.length) {
    chips.pop();
    renderChips();
    liveUpdate();
  }
}
function addChip(val) {
  chips.push(val);
  renderChips();
}
function removeChip(i) {
  chips.splice(i, 1);
  renderChips();
  liveUpdate();
}
function renderChips() {
  const wrap = document.getElementById('chips-wrap');
  const input = document.getElementById('chips-input');
  wrap.innerHTML = '';
  chips.forEach((c, i) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = `${c}<span class="chip-del" onclick="removeChip(${i})">✕</span>`;
    wrap.appendChild(chip);
  });
  wrap.appendChild(input);
  input.focus();
}

// ── DOWNLOADS ──
let dlCounter = 0;
function addDownload(preset) {
  const id = ++dlCounter;
  const p = preset || {};
  downloads.push({ id, label: p.label||'', meta: p.meta||'', startId: p.startId||'', type: p.type||'regular' });
  renderDownloads();
  liveUpdate();
}
function removeDownload(id) {
  downloads = downloads.filter(d => d.id !== id);
  renderDownloads();
  liveUpdate();
}
function renderDownloads() {
  const list = document.getElementById('dl-list');
  list.innerHTML = '';
  downloads.forEach((d, idx) => {
    const el = document.createElement('div');
    el.className = 'dl-item';
    el.innerHTML = `
      <div class="dl-item-header">
        <span>Button ${idx+1}</span>
        <select class="dl-type-select" style="width:auto;padding:4px 8px;font-size:11px" 
          onchange="updateDl(${d.id},'type',this.value)">
          <option value="regular" ${d.type==='regular'?'selected':''}>⬇ Regular</option>
          <option value="subtitle" ${d.type==='subtitle'?'selected':''}>📄 Subtitle</option>
        </select>
        <button class="dl-item-del" onclick="removeDownload(${d.id})">✕</button>
      </div>
      <div class="dl-row">
        <input class="dl-input" placeholder="Label  e.g. ⬇ Season 1" value="${d.label}" 
          oninput="updateDl(${d.id},'label',this.value)">
        <input class="dl-input" placeholder="Meta  e.g. 13 Episodes · 720p" value="${d.meta}" 
          oninput="updateDl(${d.id},'meta',this.value)">
      </div>
      <input class="dl-input" placeholder="Bot Start ID  e.g. debris_720p" value="${d.startId}" 
        oninput="updateDl(${d.id},'startId',this.value)" style="width:100%">
    `;
    list.appendChild(el);
  });
}
function updateDl(id, key, val) {
  const d = downloads.find(x => x.id === id);
  if (d) { d[key] = val; liveUpdate(); }
}

// ── GET FORM VALUES ──
function getFields() {
  return {
    title:    document.getElementById('f-title').value.trim(),
    category: document.getElementById('f-category').value,
    filename: document.getElementById('f-filename').value.trim() || 'untitled',
    desc:     document.getElementById('f-desc').value.trim(),
    ogImg:    document.getElementById('f-ogimg').value.trim(),
    poster:   document.getElementById('f-poster').value.trim(),
    trailer:  document.getElementById('f-trailer').value.trim(),
    year:     document.getElementById('f-year').value.trim(),
  };
}

// ── CATEGORY HELPERS ──
function getCategoryLabel(cat) {
  return { 'tv-series':'📺 TV Series', 'movies':'🎬 Movie', 'anime':'⛩ Anime', 'asian-dramas':'🌸 Asian Dramas' }[cat] || cat;
}
function getCategoryPath(cat) {
  return { 'tv-series':'tv-series', 'movies':'movies', 'anime':'anime', 'asian-dramas':'asian-dramas' }[cat] || cat;
}
function getCategoryBreadcrumbHref(cat) {
  return {
    'tv-series':'https://motionpicturemafia.com/downloads/',
    'movies':'https://motionpicturemafia.com/downloads/',
    'anime':'https://motionpicturemafia.com/downloads/',
    'asian-dramas':'https://motionpicturemafia.com/downloads/',
  }[cat];
}
function getCategoryBreadcrumbLabel(cat) {
  return { 'tv-series':'TV Series', 'movies':'Movies', 'anime':'Anime', 'asian-dramas':'Asian Dramas' }[cat];
}

// ── GENERATE HTML ──
function generateHTML() {
  const f = getFields();
  const allChips = [
    f.year ? `<span class="stat-chip highlight">${escHtml(f.year)}</span>` : '',
    ...chips.map(c => `<span class="stat-chip">${escHtml(c)}</span>`)
  ].filter(Boolean).join('\n        ');

  const dlButtons = downloads.map(d => {
    if (d.type === 'subtitle') {
      return `
      <a class="download-btn sub-btn" href="https://t.me/mpmfilessharebot?start=${escHtml(d.startId)}">
        <div class="btn-label">${escHtml(d.label)}</div>
        <div class="btn-meta">${escHtml(d.meta)}</div>
        <span class="btn-arrow">→</span>
      </a>`;
    }
    return `
      <a class="download-btn" href="https://t.me/mpmfilessharebot?start=${escHtml(d.startId)}">
        <div class="btn-label">${escHtml(d.label)}</div>
        <div class="btn-meta">${escHtml(d.meta)}</div>
        <span class="btn-arrow">→</span>
      </a>`;
  }).join('\n');

  const catPath = getCategoryPath(f.category);
  const ogUrl = `https://motionpicturemafia.com/downloads/${catPath}/${f.filename || 'untitled'}.html`;
  const titleTag = f.title ? `${f.title} — MPM` : 'MPM';
  const metaTitle = f.title ? `${f.title} | MPM` : '';
  const ogTitle = f.title ? `${f.title} | Motion Picture Mafia Studio` : '';
  const bgUrl = f.ogImg || '';
  const trailerSrc = f.trailer ? `https://www.youtube.com/embed/${f.trailer}` : '';

  return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="title" content="${escHtml(metaTitle)}">

// ── HELPERS ──
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── LIVE UPDATE ──
let updateTimer;
function liveUpdate() {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(refreshPreview, 300);
}
function refreshPreview() {
  const html = generateHTML();
  // Update preview frame
  const frame = document.getElementById('preview-frame');
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  frame.src = url;
  // Update code view
  document.getElementById('code-output').textContent = html;
  // Update filename
  const fn = (document.getElementById('f-filename').value.trim() || 'untitled') + '.html';
  document.getElementById('code-filename').textContent = fn;
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['preview','code'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach((c,i) => {
    const names = ['tab-preview','tab-code'];
    c.classList.toggle('active', c.id === 'tab-'+name);
  });
  if (name === 'code') refreshPreview();
}

// ── DOWNLOAD ──
function downloadHTML() {
  const html = generateHTML();
  const fn = (document.getElementById('f-filename').value.trim() || 'untitled') + '.html';
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fn;
  a.click();
  showToast('⬇ Downloaded ' + fn);
}

// ── COPY ──
async function copyCode() {
  const html = generateHTML();
  try {
    await navigator.clipboard.writeText(html);
    showToast('⎘ Copied to clipboard');
  } catch {
    showToast('⚠ Copy failed — use Download instead');
  }
}

// ── TOAST ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2800);
}
