<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MPM — Official Links</title>
<link rel="icon" type="image/png" href="https://mpm-donor.free.nf/donors/mpm%20logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* =============================================
     THEME & VARIABLES
  ============================================= */
  :root {
    --gold:   #c9a84c;
    --gold2:  #f0d080;
    --red:    #b01c2e;
    --red2:   #e02040;
    --bg:     #0a0a0c;
    --bg2:    #111116;
    --bg3:    #18181f;
    --border: rgba(201,168,76,0.18);
    --text:   #d0cfc8;
    --dim:    #7a7870;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Film grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 180px;
    pointer-events: none;
    z-index: 999;
    opacity: 0.55;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.72) 100%);
    pointer-events: none;
    z-index: 998;
  }

  /* ---- Layout ---- */
  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ---- Header ---- */
  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeUp 0.7s ease both;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 6px;
  }

  .logo-line .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
    max-width: 80px;
  }
  .logo-line .rule.right {
    background: linear-gradient(to left, transparent, var(--gold));
  }

  .site-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 88px);
    letter-spacing: 0.12em;
    line-height: 1;
    background: linear-gradient(160deg, var(--gold2) 0%, var(--gold) 55%, #8a6820 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 28px rgba(201,168,76,0.25));
  }

  .tagline {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 4px;
  }

  /* ---- Section headings ---- */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.22em;
    color: var(--gold);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--red);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ---- About ---- */
  .about-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px 26px;
    margin-bottom: 40px;
    line-height: 1.75;
    font-size: 15px;
    color: var(--text);
    animation: fadeUp 0.7s 0.1s ease both;
    position: relative;
    overflow: hidden;
  }
  .about-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--red), var(--gold), var(--red));
  }

  /* Link Styling Added Here */
  .about-card a {
    color: var(--gold);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s ease-in-out;
  }
  .about-card a:hover {
    color: var(--gold2);
  }

  /* ---- Group cards ---- */
  .groups-section {
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .group-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .group-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .group-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .group-card:hover {
    border-color: rgba(201,168,76,0.45);
    background: var(--bg3);
    transform: translateY(-1px);
  }

  .group-info {
    flex: 1;
    min-width: 0;
  }
  .group-platform {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: 'Special Elite', cursive;
    margin-bottom: 3px;
  }
  .group-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: #e8e4d8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .join-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 3px;
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    text-decoration: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .join-btn:hover {
    background: var(--gold);
    color: #0a0a0c;
  }
  .join-btn svg { width: 13px; height: 13px; }

  /* platform accent colours */
  .group-card[data-platform="whatsapp"] .group-platform { color: #4caf76; }
  .group-card[data-platform="instagram"] .group-platform {color: #ff066e; }
  .group-card[data-platform="telegram"]  .group-platform { color: #4da6d8; }
  .group-card[data-platform="discord"]   .group-platform { color: #7289da; }
  .group-card[data-platform="facebook"]  .group-platform { color: #6a8dd4; }
  .group-card[data-platform="youtube"]   .group-platform { color: #c84040; }
  .group-card[data-platform="website"]   .group-platform { color: var(--gold); }

  /* ---- Footer ---- */
  footer {
    text-align: center;
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--dim);
    font-family: 'Special Elite', cursive;
    letter-spacing: 0.08em;
    animation: fadeUp 0.7s 0.3s ease both;
  }
  footer span { color: var(--red2); }

  /* ---- Animations ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- Mobile ---- */
  @media (max-width: 480px) {
    .page { padding: 40px 16px 60px; }
    .group-card { padding: 14px 14px; }
    .join-btn { padding: 8px 14px; font-size: 14px; }
  }
</style>
</head>
