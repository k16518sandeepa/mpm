<!-- ── CARD GRID — populated by sub.js ── -->
<main id="subtitleContainer" class="card-grid"></main>

<!-- ── BACK TO TOP ── -->
<button onclick="topFunction()" class="back-to-top" id="backToTop" title="Back to top">↑</button>

<script>
  /* ── YEAR ── */
  document.getElementById("year").textContent = new Date().getFullYear();

  /* ── NAV DRAWER ── */
  const navToggle   = document.getElementById("navToggle");
  const navClose    = document.getElementById("navClose");
  const navDrawer   = document.getElementById("navDrawer");
  const navBackdrop = document.getElementById("navBackdrop");

  const openNav  = () => { document.body.classList.add("nav-open");    navToggle.setAttribute("aria-expanded","true"); }
  const closeNav = () => { document.body.classList.remove("nav-open"); navToggle.setAttribute("aria-expanded","false"); }

  navToggle.addEventListener("click", openNav);
  navClose.addEventListener("click", closeNav);
  navBackdrop.addEventListener("click", closeNav);

  let touchStartX = 0;
  document.addEventListener("touchstart", e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
  document.addEventListener("touchend", e => {
    if (!touchStartX) return;
    const diff = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(diff) > 70) { diff > 0 ? openNav() : closeNav(); }
    touchStartX = 0;
  }, { passive: true });

  /* ── BACK TO TOP ── */
  const btt = document.getElementById("backToTop");
  window.addEventListener("scroll", () => {
    btt.style.display = window.scrollY > 300 ? "flex" : "none";
  }, { passive: true });
  function topFunction() { window.scrollTo({ top: 0, behavior: "smooth" }); }

  /* ── LIVE RESULTS COUNT (updates after sub.js populates the grid) ── */
  function updateResultsHint() {
    const hint = document.getElementById("resultsHint");
    if (!hint) return;
    const visible = document.querySelectorAll("#subtitleContainer .card:not([style*='display: none'])").length;
    if (visible > 0) {
      hint.innerHTML = `<span>${visible}</span> subtitle${visible !== 1 ? "s" : ""} available`;
    } else {
      hint.innerHTML = "No results found";
    }
  }

  /* Observe when sub.js finishes adding cards */
  const observer = new MutationObserver(() => updateResultsHint());
  observer.observe(document.getElementById("subtitleContainer"), { childList: true });

  /* Also update on search input (sub.js hides/shows cards) */
  document.getElementById("searchBox").addEventListener("input", () => {
    setTimeout(updateResultsHint, 50); /* small delay so sub.js finishes filtering */
  });
</script>

<!-- sub.js handles card population & search filtering -->
<script src="sub.js"></script>
