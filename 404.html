<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Scene Not Found | Motion Picture Mafia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --gold: #c9a84c; --gold-dim: #7a6230;
    --red: #8b1a1a; --red-bright: #c0392b; --cream: #e8dfc8;
  }
  html, body { min-height: 100%; background: var(--black); color: var(--cream); font-family: 'Special Elite', cursive; overflow-x: hidden; }

  /* GRAIN */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 100; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.35; mix-blend-mode: overlay; animation: grain 0.12s steps(1) infinite;
  }
  @keyframes grain {
    0%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,1%)}
    30%{transform:translate(-1%,4%)}40%{transform:translate(4%,-2%)}50%{transform:translate(-3%,3%)}
    60%{transform:translate(1%,-4%)}70%{transform:translate(-4%,2%)}80%{transform:translate(2%,3%)}
    90%{transform:translate(3%,-1%)}100%{transform:translate(-2%,4%)}
  }
  body::after { content: ''; position: fixed; inset: 0; z-index: 99; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); }
  .vignette { position: fixed; inset: 0; z-index: 98; pointer-events: none; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.8) 100%); }

  /* FILM STRIPS */
  .strip { position: fixed; top: 0; bottom: 0; width: 40px; background: #0d0d0d; border-right: 2px solid #1a1a1a; z-index: 50; display: flex; flex-direction: column; overflow: hidden; animation: stripScroll 2s linear infinite; }
  .strip.right { right: 0; left: auto; border-right: none; border-left: 2px solid #1a1a1a; animation-direction: reverse; }
  .strip-hole { flex-shrink: 0; width: 22px; height: 15px; margin: 8px auto; background: #000; border: 1.5px solid #222; border-radius: 2px; }
  @keyframes stripScroll { from { transform: translateY(0); } to { transform: translateY(62px); } }

  /* BURN / FLICKER */
  .burn { position: fixed; inset: 0; z-index: 200; pointer-events: none; background: radial-gradient(ellipse at 30% 20%, #c9a84c44 0%, transparent 60%); opacity: 0; animation: burnFlash 4s ease 0.1s infinite; }
  @keyframes burnFlash { 0%,100%{opacity:0} 2%{opacity:.7} 4%{opacity:.1} 6%{opacity:.5} 8%,49%{opacity:0} 52%{opacity:.3} 54%{opacity:0} }
  .flicker-line { position: fixed; z-index: 201; pointer-events: none; left: 0; right: 0; height: 2px; background: rgba(201,168,76,.15); animation: flickerLine 5s steps(1) 1s infinite; top: 35%; }
  @keyframes flickerLine { 0%,100%{opacity:0;top:35%} 15%{opacity:1;top:35%} 15.5%{opacity:0} 60%{opacity:0;top:68%} 60.5%{opacity:1} 61%{opacity:0} }

  /* BULLET HOLES */
  .bullet { position: fixed; border-radius: 50%; background: radial-gradient(circle at 40% 40%, #222 0%, #0a0a0a 55%, transparent 70%); box-shadow: 0 0 0 1px #333, 0 0 8px rgba(0,0,0,.8); pointer-events: none; animation: bulletPop .2s cubic-bezier(.22,1,.36,1) both; z-index: 15; }
  .bullet::after { content: ''; position: absolute; inset: -5px; border-radius: 50%; background: radial-gradient(circle, rgba(60,40,20,.3) 0%, transparent 70%); }
  @keyframes bulletPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .b1 { width:16px; height:16px; top:22%; left:12%; animation-delay:1.8s; }
  .b2 { width:10px; height:10px; top:72%; left:9%;  animation-delay:2s; }
  .b3 { width:18px; height:18px; top:34%; right:12%;animation-delay:1.9s; }
  .b4 { width:12px; height:12px; top:78%; right:15%;animation-delay:2.1s; }

  /* STAMP */
  .stamp { position: fixed; top: 50%; right: clamp(50px, 9vw, 96px); transform: translateY(-50%) rotate(12deg); border: 3px solid var(--red-bright); color: var(--red-bright); font-family: 'Bebas Neue', sans-serif; font-size: clamp(20px, 4vw, 34px); letter-spacing: .15em; padding: 5px 10px; opacity: 0; animation: stampIn .25s cubic-bezier(.22,1,.36,1) 1.6s forwards; pointer-events: none; user-select: none; z-index: 20; }
  @keyframes stampIn { 0%{opacity:0;transform:translateY(-50%) rotate(12deg) scale(2.5)} 60%{opacity:.9;transform:translateY(-50%) rotate(12deg) scale(.94)} 100%{opacity:.85;transform:translateY(-50%) rotate(12deg) scale(1)} }

  /* LOGO */
  .logo-mark { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: .35em; color: var(--gold-dim); text-transform: uppercase; white-space: nowrap; animation: fadeIn 1s ease .2s both; }
  .logo-mark span { color: var(--gold); font-size: 13px; vertical-align: middle; margin: 0 6px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* SCENE */
  .scene { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px clamp(52px, 10vw, 110px) 40px; z-index: 10; text-align: center; }

  /* CLAPPER */
  .clapper-wrap { margin-bottom: clamp(14px, 3.5vw, 28px); animation: dropIn .7s cubic-bezier(.22,1,.36,1) both; }
  @keyframes dropIn { from{transform:translateY(-80px) rotate(-4deg);opacity:0} to{transform:translateY(0) rotate(0);opacity:1} }
  .clapper { width: clamp(230px, 78vw, 340px); background: #111; border: 3px solid #2a2a2a; border-radius: 4px; box-shadow: 0 20px 60px rgba(0,0,0,.9),0 0 0 1px #333; overflow: hidden; }
  .clapper-top { background: #1a1a1a; padding: 8px 12px 6px; border-bottom: 3px solid var(--gold); position: relative; overflow: hidden; }
  .clapper-top::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent 0,transparent 10px,rgba(201,168,76,.2) 10px,rgba(201,168,76,.2) 20px); }
  .clapper-stripe-row { display: flex; height: 17px; overflow: hidden; position: relative; animation: clapperSlam .08s ease-out 1.2s both; }
  @keyframes clapperSlam { 0%{transform:rotate(-18deg) translateY(-12px)} 60%{transform:rotate(3deg) translateY(2px)} 100%{transform:rotate(0) translateY(0)} }
  .stripe { height: 100%; flex: 1; }
  .stripe.b { background: #111; }
  .stripe.w { background: #e8dfc8; }
  .clapper-body { padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px 10px; }
  .clapper-field label { display: block; font-size: 7px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 2px; }
  .clapper-field span { font-size: 11px; color: var(--cream); }

  /* 404 */
  .four-oh-four { font-family: 'Bebas Neue', sans-serif; font-size: clamp(88px, 22vw, 200px); line-height: .85; color: transparent; -webkit-text-stroke: 2px var(--gold); letter-spacing: -.02em; position: relative; animation: glitchReveal .6s ease .5s both; user-select: none; }
  .four-oh-four::before { content: '404'; position: absolute; inset: 0; color: var(--red); -webkit-text-stroke: 0; clip-path: polygon(0 0,100% 0,100% 45%,0 45%); transform: translateX(-4px); opacity: .5; animation: glitchR 3.5s steps(1) 2s infinite; }
  .four-oh-four::after  { content: '404'; position: absolute; inset: 0; color: var(--gold-dim); -webkit-text-stroke: 0; clip-path: polygon(0 55%,100% 55%,100% 100%,0 100%); transform: translateX(4px); opacity: .4; animation: glitchB 3.5s steps(1) 2.3s infinite; }
  @keyframes glitchReveal { from{opacity:0;transform:scale(1.08) skewX(-3deg)} to{opacity:1;transform:scale(1) skewX(0)} }
  @keyframes glitchR { 0%,90%,100%{transform:translateX(-4px);opacity:.5} 91%{transform:translateX(8px);opacity:.8} 93%{transform:translateX(-6px) scaleY(1.02);opacity:.6} 95%{transform:translateX(4px);opacity:.5} }
  @keyframes glitchB { 0%,90%,100%{transform:translateX(4px);opacity:.4} 92%{transform:translateX(-8px);opacity:.7} 94%{transform:translateX(6px) scaleY(.98);opacity:.5} }

  /* ORNAMENT */
  .ornament { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 440px; margin: clamp(10px,3vw,20px) 0 clamp(8px,2vw,14px); animation: fadeUp .6s ease .9s both; }
  .ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg,transparent,var(--gold-dim)); }
  .ornament-line.right { background: linear-gradient(90deg,var(--gold-dim),transparent); }
  .ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* COPY */
  .headline { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(15px,4vw,24px); color: var(--cream); letter-spacing: .02em; animation: fadeUp .6s ease 1s both; margin-bottom: 8px; }
  .subline { font-size: clamp(10px,2.5vw,12px); color: rgba(232,223,200,.55); letter-spacing: .1em; text-transform: uppercase; animation: fadeUp .6s ease 1.1s both; margin-bottom: clamp(22px,5vw,34px); max-width: 360px; line-height: 1.85; }

  /* BUTTONS */
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; animation: fadeUp .6s ease 1.2s both; }
  .btn { display: inline-block; font-family: 'Special Elite', cursive; font-size: clamp(10px,2.5vw,13px); letter-spacing: .15em; text-transform: uppercase; text-decoration: none; padding: clamp(10px,2.5vw,12px) clamp(16px,5vw,26px); border: 1px solid var(--gold); color: var(--black); background: var(--gold); cursor: pointer; position: relative; overflow: hidden; transition: color .3s, transform .2s; white-space: nowrap; }
  .btn::before { content: ''; position: absolute; inset: 0; background: var(--red-bright); transform: translateX(-105%); transition: transform .35s cubic-bezier(.77,0,.175,1); z-index: 0; }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: #fff; border-color: var(--red-bright); }
  .btn:active { transform: scale(.97); }
  .btn span { position: relative; z-index: 1; }
  .btn-ghost { background: transparent; color: var(--gold); }
  .btn-ghost:hover { color: #fff; }

  /* MOBILE */
  @media (max-width: 480px) {
    .strip, .stamp, .b1, .b3 { display: none; }
    .scene { padding: 64px 20px 32px; }
  }
  @media (max-width: 360px) {
    .actions { flex-direction: column; align-items: stretch; }
    .btn { text-align: center; }
  }
</style>
</head>
<body>
<div class="burn"></div>
<div class="flicker-line"></div>
<div class="vignette"></div>
<div class="strip left">
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
</div>
<div class="strip right">
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
  <div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div><div class="strip-hole"></div>
</div>
<div class="bullet b1"></div><div class="bullet b2"></div>
<div class="bullet b3"></div><div class="bullet b4"></div>
<div class="stamp">MISSING</div>

<div class="scene">
  <div class="logo-mark">Motion Picture<span>✦</span>Mafia</div>

  <div class="clapper-wrap">
    <div class="clapper">
      <div class="clapper-top">
        <div class="clapper-stripe-row">
          <div class="stripe b"></div><div class="stripe w"></div><div class="stripe b"></div><div class="stripe w"></div>
          <div class="stripe b"></div><div class="stripe w"></div><div class="stripe b"></div><div class="stripe w"></div>
          <div class="stripe b"></div><div class="stripe w"></div><div class="stripe b"></div><div class="stripe w"></div>
        </div>
      </div>
      <div class="clapper-body">
        <div class="clapper-field"><label>Production</label><span>Motion Picture Mafia</span></div>
        <div class="clapper-field"><label>Roll</label><span>Error — 404</span></div>
        <div class="clapper-field"><label>Scene</label><span>Unknown</span></div>
        <div class="clapper-field"><label>Take</label><span>∞</span></div>
      </div>
    </div>
  </div>

  <div class="four-oh-four">404</div>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line right"></div>
  </div>

  <p class="headline">This scene was cut from the final print.</p>
  <p class="subline">The page you're looking for has gone underground.<br>Consider it sleeping with the fishes.</p>

  <div class="actions">
    <a class="btn" href="/"><span>Return to the Family</span></a>
    <a class="btn btn-ghost" href="javascript:history.back()"><span>← Go Back</span></a>
  </div>
</div>
</body>
</html>
